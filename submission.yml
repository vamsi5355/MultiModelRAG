name: MultiModelRag
description: Multimodal Retrieval-Augmented Generation system for querying PDF documents using CLIP embeddings, FAISS retrieval, and Gemini LLM.

entrypoint: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

install:
  - pip install -r requirements.txt

run:
  - uvicorn src.api.main:app --host 0.0.0.0 --port 8000

evaluation:
  command: python evaluation.py

environment:
  - GEMINI_API_KEY

files:
  - src/
  - sample_documents/
  - evaluation.py
  - requirements.txt
  - README.md
  - ARCHITECTURE.md